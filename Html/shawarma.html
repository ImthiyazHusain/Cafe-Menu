<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PowerHouse Menu"
    />
    <title>PowerHouse — Shawarma Menu</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header id="header">
      <nav class="nav-container">
        <div class="logo-container">
          <img
            src="../images/logo/icon_logo.png"
            alt="PowerHouse Logo"
            width="40px"
          />
          <a href="../index.html" class="logo" aria-label="PowerHouse Home">
            <span class="logo-main">PowerHouse</span>
          </a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section menu-section">
        <div class="container">
          <div class="section-header">
            <p class="section-label">Shawarma Menu</p>
            <h2 class="section-title">All Shawarma Selections</h2>
          </div>
          <section class="menu-grid" id="shawarmaMenuGrid"></section>
          <br />
          <h2 class="section-title">Bun Shawarma</h2>
          <br />
          <section class="menu-grid" id="bunShawarmaMenuGrid"></section>
          <br />
          <h2 class="section-title">Cone Shawarma</h2>
          <br />
          <section class="menu-grid" id="coneShawarmaMenuGrid"></section>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <a href="../index.html#home" class="footer-logo">PowerHouse</a>
        <p class="footer-tagline">Taste the Fire, Feel the Power</p>
      </div>
    </footer>
    <script src="../js/data.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
